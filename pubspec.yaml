name: gallery_app
description: A new Flutter photo sorting app based on a React prototype.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  fl_chart: ^0.68.0
  photo_manager: ^3.9.0
  permission_handler: ^12.0.1
  intl: ^0.20.2
  photo_view: ^0.15.0
  google_fonts: ^6.2.1
  photo_manager_image_provider: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
